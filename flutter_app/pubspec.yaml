name: nutriwow_app
description: "Nutriwow — Premium Dry Fruits & Healthy Snacks"
publish_to: 'none'

# versionName+versionCode. versionCode must be higher than any code already
# uploaded to Play Store (Capacitor app used 2, an earlier build used 1).
version: 2.0.2+32

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  path_provider: ^2.1.4
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  razorpay_flutter: ^1.3.7
  intl: ^0.19.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/nutriwow-logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_full.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"
  remove_alpha_ios: true
