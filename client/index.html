    <!-- Preload cached hero slide on return visits — runs before React boots for faster LCP -->
    <script>
      try {
        var _s = JSON.parse(localStorage.getItem('nw_hero_slides_v1') || 'null');
        if (_s && _s[0]) {
          var _mob = window.innerWidth < 640;
          var _u = _mob ? (_s[0].mobileImage || _s[0].desktopImage) : _s[0].desktopImage;
          var _w = _mob ? 828 : 1600;
          if (_u) {
            var _l = document.createElement('link');
            _l.rel = 'preload'; _l.as = 'image';
            _l.href = '/_vercel/image?url=' + encodeURIComponent(_u) + '&w=' + _w + '&q=75';
            document.head.appendChild(_l);
          }
        }
      } catch(e) {}
    </script>
