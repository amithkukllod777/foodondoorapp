name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Test (unit; live-integration suites excluded)
        run: pnpm test

      - name: Build client
        run: pnpm vite build

      - name: Build server (Vercel bundle)
        run: pnpm build:vercel
