name: Build Android APK & AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm vite build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Decode keystore
        if: env.HAS_KEYSTORE != ''
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/nutriwow-release.keystore

      - name: Build signed release AAB
        if: env.HAS_KEYSTORE != ''
        working-directory: android
        env:
          KEYSTORE_FILE: ../nutriwow-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Build signed release APK
        if: env.HAS_KEYSTORE != ''
        working-directory: android
        env:
          KEYSTORE_FILE: ../nutriwow-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nutriwow-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release AAB
        if: env.HAS_KEYSTORE != ''
        uses: actions/upload-artifact@v4
        with:
          name: nutriwow-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload release APK
        if: env.HAS_KEYSTORE != ''
        uses: actions/upload-artifact@v4
        with:
          name: nutriwow-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
